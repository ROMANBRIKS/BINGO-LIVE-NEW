global
    log stdout format raw local0
    maxconn 100000

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms

frontend sfu_frontend
    bind *:80
    # Enable WebSockets / WS passthrough explicitly
    option http-server-close
    option forwardfor
    
    # Route SFU control signaling & media handshakes
    default_backend sfu_servers

backend sfu_servers
    balance leastconn
    # Periodic HTTP health state queries
    option httpchk GET /health
    http-check expect status 200
    
    server sfu1 sfu-node-1:3001 check inter 2000 fall 3 rise 2
    server sfu2 sfu-node-2:3002 check inter 2000 fall 3 rise 2
